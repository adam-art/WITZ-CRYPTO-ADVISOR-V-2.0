<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="WITZ — AI Crypto Portfolio Advisor dengan Data Real-Time"/>
  <title>WITZ — AI Crypto Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body,#root{height:100%;background:#03030A}
    body{overflow:hidden}
    #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#03030A;z-index:9999;gap:16px;transition:opacity 0.4s ease}
    .sl{width:68px;height:68px;border-radius:20px;background:linear-gradient(135deg,#C6FF00,#88CC00);
      display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;
      font-weight:900;font-size:32px;color:#03030A;animation:breathe 1.6s ease-in-out infinite}
    .sn{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;letter-spacing:-0.04em;color:#fff}
    .ss{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.25)}
    @keyframes breathe{0%,100%{box-shadow:0 0 30px rgba(198,255,0,0.3)}50%{box-shadow:0 0 70px rgba(198,255,0,0.6)}}
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-thumb{background:rgba(198,255,0,0.2);border-radius:2px}
  </style>
</head>
<body>
  <div id="splash">
    <div class="sl">W</div>
    <div class="sn">WITZ</div>
    <div class="ss">Memuat AI Portfolio Engine...</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    window.__hideSplash = () => {
      const s = document.getElementById('splash')
      if(s){s.style.opacity='0';setTimeout(()=>s.remove(),400)}
    }
  </script>
</body>
</html>
